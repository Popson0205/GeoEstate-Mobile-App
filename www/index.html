<script>
  // Capacitor plugin bootstrap (guarded — no-ops in a plain browser)
  document.addEventListener('deviceready', function () {
    try {
      if (window.Capacitor && Capacitor.Plugins.StatusBar) {
        Capacitor.Plugins.StatusBar.setBackgroundColor({ color: '#0a1a11' });
        Capacitor.Plugins.StatusBar.setStyle({ style: 'DARK' });
      }
      if (window.Capacitor && Capacitor.Plugins.SplashScreen) {
        Capacitor.Plugins.SplashScreen.hide();
      }
    } catch (e) { console.warn('Capacitor plugin init skipped', e); }
  }, false);
</script>
